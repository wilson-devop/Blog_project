
{% extends 'blog/base.html' %}

{% block content %}

<h1>Register</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

<p>
    Already have an account?
    <a href="{% url 'login' %}">Login here</a>
    <a href="{% url 'home' %}">← Back to Home</a>
</p>

{% endblock %}

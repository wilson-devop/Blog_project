
{% extends 'blog/base.html' %}

{% block content %}

<div class="container">

    <h1>My Blog Site <br>where you share your thoughts</h1>

    {% for post in posts %}


        <div class="card">

            <h2>
                <a href="{% url 'post_detail' post.id %}">
                    {{ post.title }}
                </a>
            </h2>

            <p>By {{ post.author.username }}</p>

            <p>{{ post.content }}</p>

        </div>

    {% empty %}

        <p>No posts available yet.</p>

    {% endfor %}

</div>

{% endblock %}

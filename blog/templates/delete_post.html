<!DOCTYPE html>
<html>
<head>
    <title>Delete Post</title>
</head>
<body>

    <h1>Delete Post</h1>

    <p>
        Are you sure you want to delete:
        <strong>{{ post.title }}</strong>?
    </p>

    <form method="POST">
        {% csrf_token %}

        <button type="submit">
            Yes, Delete
        </button>
    </form>

    <br>

    <a href="{% url 'post_detail' post.id %}">
        Cancel
    </a>

</body>
</html>
